<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #0d47a1;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 20px;
    }

    .panel {
      background: white;
      padding: 20px;
      width: 260px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    select, button {
      width: 100%;
      margin-top: 10px;
    }

    button {
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0d47a1;
    }

    /* ===== BEAKER ===== */
    .beaker {
      width: 220px;
      height: 300px;
      border: 5px solid #555;
      border-top: none;
      border-radius: 0 0 30px 30px;
      position: relative;
      background: #fafafa;
      margin: auto;
      overflow: hidden;
    }

    /* Cairan bening */
    .liquid {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 75%;
      background: rgba(180, 220, 255, 0.25);
      border-top: 2px solid rgba(255,255,255,0.7);
    }

    /* ===== LAKMUS TOOL ===== */
    .lakmus-tool {
      width: 28px;
      height: 120px;
      border: 1px solid #333;
      border-radius: 4px;
      cursor: grab;
      margin: 15px auto;
      background: red;
    }

    .lakmus-tool.blue {
      background: blue;
    }

    .label {
      text-align: center;
      font-size: 13px;
      margin-top: 4px;
    }

    /* ===== LAKMUS DI BOTOL ===== */
    .lakmus-botol {
      position: absolute;
      left: 50%;
      top: 25%;
      transform: translateX(-50%);
      width: 20px;
      height: 100px;
      border: 1px solid #333;
      display: none;
      z-index: 10;
    }
  </style>
</head>

<body>

<h1>🧪 Simulasi Asam–Basa (Lakmus Terendam)</h1>

<div class="container">

  <!-- PANEL KONTROL -->
  <div class="panel">
    <label>Pilih Zat</label>
    <select id="zat" onchange="gantiZat()">
      <option value="H2O">H₂O (Netral)</option>
      <option value="HCl">HCl (Asam)</option>
      <option value="CH3COOH">CH₃COOH (Asam)</option>
      <option value="NaOH">NaOH (Basa)</option>
      <option value="NH3">NH₃ (Basa)</option>
    </select>

    <p><b>pH larutan:</b> <span id="phValue">7</span></p>

    <button onclick="resetSimulasi()">Reset</button>

    <!-- Lakmus Merah -->
    <div class="lakmus-tool"
         id="red"
         draggable="true"
         ondragstart="drag(event)">
    </div>
    <div class="label">Lakmus Merah</div>

    <!-- Lakmus Biru -->
    <div class="lakmus-tool blue"
         id="blue"
         draggable="true"
         ondragstart="drag(event)">
    </div>
    <div class="label">Lakmus Biru</div>
  </div>

  <!-- PANEL SIMULASI -->
  <div class="panel">
    <div class="beaker">
      <div class="liquid"
           ondragover="event.preventDefault()"
           ondrop="dropLakmus(event)">
      </div>

      <!-- LAKMUS TERCELUP PENUH -->
      <div class="lakmus-botol" id="lakmusBotol"></div>
    </div>
  </div>

</div>

<script>
  const dataZat = {
    HCl: { pH: 1, sifat: "asam" },
    CH3COOH: { pH: 3, sifat: "asam" },
    NaOH: { pH: 13, sifat: "basa" },
    NH3: { pH: 10, sifat: "basa" },
    H2O: { pH: 7, sifat: "netral" }
  };

  let zatAktif = "H2O";

  function gantiZat() {
    zatAktif = zat.value;
    phValue.innerText = dataZat[zatAktif].pH;
    resetSimulasi();
  }

  function drag(ev) {
    ev.dataTransfer.setData("warna", ev.target.id);
  }

  function dropLakmus(ev) {
    ev.preventDefault();
    const warna = ev.dataTransfer.getData("warna");
    const sifat = dataZat[zatAktif].sifat;

    lakmusBotol.style.display = "block";
    lakmusBotol.style.background = warna;

    if (warna === "red" && sifat === "basa") {
      lakmusBotol.style.background = "blue";
    }
    if (warna === "blue" && sifat === "asam") {
      lakmusBotol.style.background = "red";
    }
  }

  function resetSimulasi() {
    lakmusBotol.style.display = "none";
  }

  const zat = document.getElementById("zat");
  const phValue = document.getElementById("phValue");
  const lakmusBotol = document.getElementById("lakmusBotol");

  gantiZat();
</script>

</body>
</html>
