<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulasi Virtual Asam Basa</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#e3f2fd,#ffffff);
  }

  header {
    background: #0d47a1;
    color: white;
    text-align: center;
    padding: 12px;
  }

  header h1 {
    margin: 0;
    font-size: 18px;
  }

  header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.9;
  }

  .warning {
    display: none;
    background: #ffcc00;
    text-align: center;
    padding: 10px;
    font-size: 14px;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    flex-wrap: wrap;
  }

  .panel {
    background: white;
    padding: 20px;
    width: 260px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
  }

  select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    font-size: 15px;
  }

  .info {
    margin-top: 12px;
    font-weight: bold;
    text-align: center;
    color: #0d47a1;
  }

  /* ==== BEAKER ==== */
  .beaker {
    width: 230px;
    height: 300px;
    border: 5px solid #555;
    border-top: none;
    border-radius: 0 0 30px 30px;
    background: #f8fbff;
    position: relative;
    margin: auto;
    overflow: hidden;
  }

  .liquid {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 75%;
    background: rgba(180,220,255,0.25);
    border-top: 2px solid rgba(255,255,255,0.6);
  }

  /* ==== LAKMUS ==== */
  .lakmus {
    width: 28px;
    height: 120px;
    border: 1px solid #333;
    border-radius: 5px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    touch-action: none;
  }

  .red { background:red; top: 20px; }
  .blue { background:blue; top: 160px; }

  /* Lakmus di gelas */
  .lakmus-gelas {
    position: absolute;
    left: 50%;
    top: 25%;
    transform: translateX(-50%);
    width: 22px;
    height: 110px;
    border: 1px solid #333;
    display: none;
    z-index: 10;
  }

  @media (max-width: 768px) {
    .container { flex-direction: row; }
    .warning { display:block; }
  }
</style>
</head>

<body>

<header>
  <h1>SIMULASI VIRTUAL</h1>
  <p>SMAN MAPAT TUNGGUL SELATAN</p>
</header>

<div class="warning">
  Untuk pengalaman terbaik, gunakan mode <b>LANDSCAPE</b> 🔄
</div>

<div class="container">

  <!-- KONTROL -->
  <div class="panel">
    <label>Pilih Larutan</label>
    <select id="zat" onchange="gantiZat()">
      <option value="H2O">Air (H₂O)</option>
      <option value="HCl">HCl – Asam kuat</option>
      <option value="HNO3">HNO₃ – Asam kuat</option>
      <option value="CH3COOH">CH₃COOH – Asam lemah</option>
      <option value="NaOH">NaOH – Basa kuat</option>
      <option value="NH3">NH₃ – Basa lemah</option>
    </select>

    <div class="info">
      pH = <span id="ph">7</span>
    </div>
  </div>

  <!-- SIMULASI -->
  <div class="panel">
    <div class="beaker" id="beaker">
      <div class="liquid"></div>

      <div class="lakmus-gelas" id="lakmusGelas"></div>
    </div>

    <div class="lakmus red" id="lakmusRed"></div>
    <div class="lakmus blue" id="lakmusBlue"></div>
  </div>
</div>

<script>
  const data = {
    HCl:{pH:1,sifat:"asam"},
    HNO3:{pH:1,sifat:"asam"},
    CH3COOH:{pH:3,sifat:"asam"},
    NaOH:{pH:13,sifat:"basa"},
    NH3:{pH:10,sifat:"basa"},
    H2O:{pH:7,sifat:"netral"}
  };

  let zatAktif="H2O";

  function gantiZat(){
    zatAktif=zat.value;
    ph.innerText=data[zatAktif].pH;
    lakmusGelas.style.display="none";
  }

  function enableDrag(el, warna){
    el.addEventListener("pointerdown",(e)=>{
      el.setPointerCapture(e.pointerId);

      function move(ev){
        el.style.left=ev.clientX+"px";
        el.style.top=ev.clientY+"px";
      }

      function up(){
        cekCelup(warna);
        document.removeEventListener("pointermove",move);
        document.removeEventListener("pointerup",up);
      }

      document.addEventListener("pointermove",move);
      document.addEventListener("pointerup",up);
    });
  }

  function cekCelup(warna){
    const sifat=data[zatAktif].sifat;
    lakmusGelas.style.display="block";
    lakmusGelas.style.background=warna;

    if(warna==="red" && sifat==="basa"){
      lakmusGelas.style.background="blue";
    }
    if(warna==="blue" && sifat==="asam"){
      lakmusGelas.style.background="red";
    }
  }

  enableDrag(lakmusRed,"red");
  enableDrag(lakmusBlue,"blue");
  gantiZat();
</script>

</body>
</html>
