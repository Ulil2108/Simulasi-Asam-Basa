<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulasi Virtual Asam Basa</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#e3f2fd,#ffffff);
  }

  header {
    background: #0d47a1;
    color: white;
    text-align: center;
    padding: 12px;
  }

  header h1 {
    margin: 0;
    font-size: 18px;
  }

  header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.9;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    flex-wrap: wrap;
  }

  .panel {
    background: white;
    padding: 20px;
    width: 280px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
  }

  label {
    font-weight: bold;
    display: block;
    margin-bottom: 6px;
  }

  select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    font-size: 15px;
  }

  .info {
    margin: 12px 0;
    font-weight: bold;
    text-align: center;
    color: #0d47a1;
  }

  /* ===== LAKMUS DI PANEL ===== */
  .lakmus-panel {
    margin-top: 10px;
  }

  .lakmus {
    width: 28px;
    height: 120px;
    border: 1px solid #333;
    border-radius: 5px;
    margin: 10px auto;
    touch-action: none;
  }

  .red { background:red; }
  .blue { background:blue; }

  .label {
    text-align: center;
    font-size: 13px;
  }

  /* ===== BEAKER ===== */
  .beaker {
    width: 230px;
    height: 300px;
    border: 5px solid #555;
    border-top: none;
    border-radius: 0 0 30px 30px;
    background: #f8fbff;
    position: relative;
    margin: auto;
    overflow: hidden;
  }

  .liquid {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 75%;
    background: rgba(180,220,255,0.25);
    border-top: 2px solid rgba(255,255,255,0.6);
  }

  /* ===== LAKMUS DI GELAS (HASIL) ===== */
  .lakmus-gelas {
    position: absolute;
    left: 50%;
    top: 25%;
    transform: translateX(-50%);
    width: 22px;
    height: 110px;
    border: 1px solid #333;
    display: none;
  }

  /* ===== LAKMUS GHOST (YANG DIGESER) ===== */
  .lakmus-ghost {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
  }

  @media (max-width: 768px) {
    .container {
      flex-direction: column;
      align-items: center;
    }
  }
</style>
</head>

<body>

<header>
  <h1>SIMULASI VIRTUAL</h1>
  <p>SMAN MAPAT TUNGGUL SELATAN</p>
</header>

<div class="container">

  <!-- PANEL KONTROL -->
  <div class="panel">
    <label>Pilih larutan</label>
    <select id="zat" onchange="gantiZat()">
      <option value="H2O">Air (H₂O)</option>
      <option value="HCl">HCl – Asam kuat</option>
      <option value="HNO3">HNO₃ – Asam kuat</option>
      <option value="CH3COOH">CH₃COOH – Asam lemah</option>
      <option value="NaOH">NaOH – Basa kuat</option>
      <option value="NH3">NH₃ – Basa lemah</option>
    </select>

    <div class="info">pH = <span id="phValue">7</span></div>

    <div class="lakmus-panel">
      <div class="lakmus red" id="red"></div>
      <div class="label">Lakmus Merah</div>

      <div class="lakmus blue" id="blue"></div>
      <div class="label">Lakmus Biru</div>
    </div>
  </div>

  <!-- PANEL SIMULASI -->
  <div class="panel">
    <div class="beaker" id="beaker">
      <div class="liquid"></div>
      <div id="lakmusGelas" class="lakmus-gelas"></div>
    </div>
  </div>

</div>

<script>
  const dataZat = {
    HCl:{pH:1,sifat:'asam'},
    HNO3:{pH:1,sifat:'asam'},
    CH3COOH:{pH:3,sifat:'asam'},
    NaOH:{pH:13,sifat:'basa'},
    NH3:{pH:10,sifat:'basa'},
    H2O:{pH:7,sifat:'netral'}
  };

  let zatAktif="H2O";
  let ghost = null;

  function gantiZat(){
    zatAktif=zat.value;
    phValue.textContent=dataZat[zatAktif].pH;
    lakmusGelas.style.display="none";
  }

  function aktifkanLakmus(el, warna){
    el.addEventListener("pointerdown",(e)=>{
      // buat ghost
      ghost = el.cloneNode(true);
      ghost.classList.add("lakmus-ghost");
      document.body.appendChild(ghost);

      function move(ev){
        ghost.style.left = (ev.clientX - 14)+"px";
        ghost.style.top  = (ev.clientY - 60)+"px";
      }

      function up(ev){
        const rect = beaker.getBoundingClientRect();
        if(
          ev.clientX > rect.left &&
          ev.clientX < rect.right &&
          ev.clientY > rect.top &&
          ev.clientY < rect.bottom
        ){
          tampilkanLakmusGelas(warna);
        }
        ghost.remove();
        ghost = null;
        document.removeEventListener("pointermove",move);
        document.removeEventListener("pointerup",up);
      }

      document.addEventListener("pointermove",move);
      document.addEventListener("pointerup",up);
    });
  }

  function tampilkanLakmusGelas(warna){
    const sifat = dataZat[zatAktif].sifat;
    lakmusGelas.style.display="block";
    lakmusGelas.style.background = warna;

    if(warna==="red" && sifat==="basa") lakmusGelas.style.background="blue";
    if(warna==="blue" && sifat==="asam") lakmusGelas.style.background="red";
  }

  aktifkanLakmus(red,"red");
  aktifkanLakmus(blue,"blue");

  gantiZat();
</script>

</body>
</html>
